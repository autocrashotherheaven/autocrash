<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synchronized Video Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .video-container {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            font-size: 12px;
            opacity: 0.6;
            font-family: monospace;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <div id="video-embed">
            <iframe
                id="vimeo-player"
                src="https://player.vimeo.com/video/372818960?h=&autoplay=0"
                allow="autoplay; fullscreen; picture-in-picture"
                allowfullscreen
            ></iframe>
        </div>
        <div class="info">
            <div>Current time (GMT): <span id="gmt-time"></span></div>
            <div>Video progress: <span id="video-progress"></span></div>
            <div>Status: <span id="status">Loading...</span></div>
        </div>
    </div>

    <script src="https://player.vimeo.com/api/player.js"></script>
    <script>
        // CONFIGURATION
        const VIDEO_DURATION = 1433; // Duration in seconds (10 minutes) - set this to your video's duration

        // Calculate the current playback position based on GMT
        function getVideoStartTime() {
            const now = new Date();
            
            // Get seconds since midnight GMT
            const gmtMidnight = new Date(now.toLocaleString('en-US', { timeZone: 'GMT' }));
            gmtMidnight.setHours(0, 0, 0, 0);
            
            const secondsSinceMidnight = Math.floor((now - gmtMidnight) / 1000);
            
            // Calculate position in the video loop
            const videoPosition = secondsSinceMidnight % VIDEO_DURATION;
            
            return videoPosition;
        }

        // Initialize Vimeo player with API
        function initializePlayer() {
            const iframe = document.getElementById('vimeo-player');
            const player = new Vimeo.Player(iframe);

            // Wait for the video to be ready and have duration info
            player.on('loadedmetadata', () => {
                console.log('Video metadata loaded');
                const startTime = getVideoStartTime();
                console.log(`Attempting to set video to ${Math.floor(startTime)}s`);
                
                player.setCurrentTime(startTime).then(() => {
                    console.log('Successfully set current time');
                    document.getElementById('status').textContent = `Seeking to ${Math.floor(startTime)}s...`;
                    player.play();
                }).catch(err => {
                    console.error('Error setting playback time:', err);
                    document.getElementById('status').textContent = 'Error: ' + err.message;
                });
            });

            // Also try on play event as backup
            player.on('play', () => {
                const startTime = getVideoStartTime();
                player.getCurrentTime().then(currentTime => {
                    if (currentTime < 1) {
                        console.log('Resetting to GMT time on play');
                        player.setCurrentTime(startTime).then(() => {
                            document.getElementById('status').textContent = `Playing from ${Math.floor(startTime)}s`;
                        });
                    }
                });
            });

            // Set up looping
            player.on('ended', () => {
                console.log('Video ended, restarting');
                player.setCurrentTime(0).then(() => {
                    player.play();
                });
            });
        }

        // Update the displayed time info
        function updateTimeInfo() {
            const now = new Date();
            document.getElementById('gmt-time').textContent = now.toUTCString();
            
            const videoPosition = getVideoStartTime();
            const minutes = Math.floor(videoPosition / 60);
            const seconds = Math.floor(videoPosition % 60);
            document.getElementById('video-progress').textContent = 
                `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        // Initialize on load
        window.addEventListener('load', () => {
            initializePlayer();
            updateTimeInfo();
            setInterval(updateTimeInfo, 1000);
        });
    </script>
</body>
</html>
