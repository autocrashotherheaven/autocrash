<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synchronized Video Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .video-container {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <div id="video-embed">
            <iframe
                id="vimeo-player"
                src="https://player.vimeo.com/video/372818960?h=&autoplay=0"
                allow="autoplay; fullscreen; picture-in-picture"
                allowfullscreen
            ></iframe>
        </div>
    </div>

    <script src="https://player.vimeo.com/api/player.js"></script>
    <script>
        // CONFIGURATION
        const VIDEO_DURATION = 1433; // Duration in seconds (10 minutes) - set this to your video's duration

        // Calculate the current playback position based on GMT
        function getVideoStartTime() {
            const now = new Date();
            
            // Get seconds since midnight GMT
            const gmtMidnight = new Date(now.toLocaleString('en-US', { timeZone: 'GMT' }));
            gmtMidnight.setHours(0, 0, 0, 0);
            
            const secondsSinceMidnight = Math.floor((now - gmtMidnight) / 1000);
            
            // Calculate position in the video loop
            const videoPosition = secondsSinceMidnight % VIDEO_DURATION;
            
            return videoPosition;
        }

        // Initialize Vimeo player with API
        function initializePlayer() {
            const iframe = document.getElementById('vimeo-player');
            const player = new Vimeo.Player(iframe);

            // Wait for the video to be ready and have duration info
            player.on('loadedmetadata', () => {
                const startTime = getVideoStartTime();
                
                player.setCurrentTime(startTime).then(() => {
                    player.play();
                }).catch(err => {
                    console.error('Error setting playback time:', err);
                });
            });

            // Also try on play event as backup
            player.on('play', () => {
                const startTime = getVideoStartTime();
                player.getCurrentTime().then(currentTime => {
                    if (currentTime < 1) {
                        player.setCurrentTime(startTime);
                    }
                });
            });

            // Set up looping
            player.on('ended', () => {
                player.setCurrentTime(0).then(() => {
                    player.play();
                });
            });
        }

        // Initialize on load
        window.addEventListener('load', () => {
            initializePlayer();
        });
    </script>
</body>
</html>
